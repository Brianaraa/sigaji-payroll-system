<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>handhold — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────
       Design Tokens & Base
    ───────────────────────────────────── */
    :root {
      --bg-page:       #FAF9F6; /* Light beige background */
      --bg-card:       #FFFFFF;
      --text-main:     #1A1A1A;
      --text-muted:    #737373;
      --border-color:  #E5E5E5;
      --primary:       #000000;
      
      --font-serif:    'Playfair Display', serif;
      --font-sans:     'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ─────────────────────────────────────
       Layout & Card
    ───────────────────────────────────── */
    .login-card {
      width: 100%;
      max-width: 1000px;
      min-height: 640px;
      background: var(--bg-card);
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.02);
      display: flex;
      overflow: hidden;
    }

    /* ─────────────────────────────────────
       Left Half — Form
    ───────────────────────────────────── */
    .form-column {
      flex: 1;
      padding: 48px 64px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: auto;
    }

    .brand-icon {
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--text-main);
      border-radius: 6px;
      position: relative;
    }
    .brand-icon::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: var(--text-main);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .brand-text {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .login-content {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    .login-heading {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .input-field::placeholder { color: #A3A3A3; }

    /* Input with icons */
    .input-icon-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #A3A3A3;
      font-size: 16px;
    }
    
    .has-icon { padding-left: 44px; }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #A3A3A3;
      cursor: pointer;
      font-size: 16px;
    }

    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 36px;
      margin-bottom: 48px;
    }

    .btn-submit {
      background: var(--primary);
      color: #FFFFFF;
      border: none;
      padding: 14px 36px;
      border-radius: 99px; /* Pill shape */
      font-family: var(--font-sans);
      font-size: 14.5px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .forgot-link {
      font-size: 13.5px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--primary); }

    .signup-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: auto;
    }
    
    .signup-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    /* Error Msg */
    .login-error {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      color: #DC2626;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .login-error.visible { display: block; }

    /* ─────────────────────────────────────
       Right Half — Graphic
    ───────────────────────────────────── */
    .graphic-column {
      flex: 1;
      padding: 16px; 
      display: flex;
    }

    .graphic-inner {
      flex: 1;
      border-radius: 20px;
      /* Abstract blurry mesh gradient */
      background: 
        radial-gradient(circle at 10% 20%, rgba(253, 230, 138, 0.9) 0%, transparent 55%), /* Soft gold */
        radial-gradient(circle at 85% 85%, rgba(59, 130, 246, 0.7) 0%, transparent 60%),  /* Vibrant blue */
        radial-gradient(circle at 50% 50%, rgba(243, 232, 255, 0.9) 0%, transparent 75%), /* Soft beige/purple mix */
        #FDFBF7; /* Base very light beige */
      position: relative;
      overflow: hidden;
    }

    /* Grainy noise overlay using SVG filter via data URI */
    .graphic-inner::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.12'/%3E%3C/svg%3E");
      opacity: 0.8;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .login-card { flex-direction: column; min-height: auto; }
      .graphic-column { display: none; }
      .form-column { padding: 48px 32px; }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <!-- Left Half: Form -->
    <div class="form-column">
      
      <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-text">handhold</div>
      </div>

      <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
        <div class="login-content">
          <h1 class="login-heading">Sign in</h1>
          
          <div class="login-error" id="login-error">
            Email or password incorrect.
          </div>

          <form id="form-login">
            <div class="form-group">
              <label for="input-email">Email address</label>
              <div class="input-icon-wrap">
                <!-- Tiny key icon inside SVG -->
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                </svg>
                <input type="email" id="input-email" class="input-field has-icon" placeholder="name@company.com" required>
              </div>
            </div>

            <div class="form-group">
              <label for="input-password">Password</label>
              <div class="input-icon-wrap">
                <input type="password" id="input-password" class="input-field" placeholder="••••••••" required>
                <button type="button" class="eye-btn" id="btn-toggle-pw">👁</button>
              </div>
            </div>

            <div class="actions-row">
              <button type="submit" class="btn-submit" id="btn-login">Sign in</button>
            </div>
          </form>

        </div>
      </div>

      <!-- Akun dibuat secara manual oleh pihak IT -->

    </div>

    <!-- Right Half: Graphic -->
    <div class="graphic-column">
      <div class="graphic-inner"></div>
    </div>
  </div>

  <script>
    // ── Cek jika sudah login (token valid di localStorage) ──
    const existingToken = localStorage.getItem('sigaji_token');
    if (existingToken) {
      window.location.replace('index.html');
    }

    const API_BASE = 'http://localhost:3000/api';

    const inputPw   = document.getElementById("input-password");
    const btnToggle = document.getElementById("btn-toggle-pw");

    btnToggle.addEventListener("click", () => {
      const isHidden = inputPw.type === "password";
      inputPw.type   = isHidden ? "text" : "password";
      btnToggle.textContent = isHidden ? "🙈" : "👁";
    });

    const form     = document.getElementById("form-login");
    const btnLogin = document.getElementById("btn-login");
    const errBox   = document.getElementById("login-error");

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.add("visible");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("input-email").value.trim().toLowerCase();
      const password = document.getElementById("input-password").value;

      if (!email || !password) {
        showError("Email dan password wajib diisi.");
        return;
      }

      errBox.classList.remove("visible");
      btnLogin.disabled    = true;
      btnLogin.textContent = "Signing in...";

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Simpan token & user ke localStorage
          localStorage.setItem('sigaji_token', data.token);
          localStorage.setItem('sigaji_user',  JSON.stringify(data.user));
          window.location.replace('index.html');
        } else {
          showError(data.message || "Email atau password salah.");
        }
      } catch (err) {
        // Jika backend tidak berjalan, tampilkan pesan yang jelas
        showError("Tidak dapat terhubung ke server. Pastikan backend sudah berjalan (node server.js).");
        console.error('[Login] Fetch error:', err);
      } finally {
        btnLogin.disabled    = false;
        btnLogin.textContent = "Sign in";
      }
    });

    document.getElementById("input-password").addEventListener("input", () => errBox.classList.remove("visible"));
    document.getElementById("input-email").addEventListener("input", () => errBox.classList.remove("visible"));
  </script>
</body>
</html>
